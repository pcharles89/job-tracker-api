services:
  mysql:
    image: mysql:8.4
    container_name: jobtracker-mysql
    environment:
      MYSQL_DATABASE: jobtracker
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    container_name: jobtracker-api
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jobtracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters-long
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

volumes:
  mysql-data: